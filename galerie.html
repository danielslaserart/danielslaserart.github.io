<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniels Laser Art | Galerie</title>
  <style>
   .lightbox {
  position: fixed;
  inset: 0;
  background: rgba(5, 2, 8, 0.92);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 9999;
}

.lightbox.open {
  display: flex;
}

.lightbox img {
  max-width: min(1100px, 92vw);
  max-height: 88vh;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  user-select: none;
  -webkit-user-drag: none;
}

.lightbox-close,
.lightbox-nav {
  position: absolute;
  border: 0;
  border-radius: 50%;
  cursor: pointer;
  color: white;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
}

.lightbox-close {
  top: 18px;
  right: 22px;
  width: 48px;
  height: 48px;
  font-size: 2rem;
  line-height: 1;
}

.lightbox-nav {
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 52px;
  font-size: 2rem;
  line-height: 1;
}

.lightbox-prev {
  left: 18px;
}

.lightbox-next {
  right: 18px;
}

.lightbox-counter {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: white;
  font-weight: 700;
  font-size: 0.95rem;
}

@media (max-width: 700px) {
  .lightbox {
    padding: 16px;
  }

  .lightbox-nav {
    width: 44px;
    height: 44px;
    font-size: 1.7rem;
  }

  .lightbox-prev {
    left: 10px;
  }

  .lightbox-next {
    right: 10px;
  }

  .lightbox-close {
    top: 10px;
    right: 10px;
    width: 44px;
    height: 44px;
  }
}
    :root {
      --bg: #09030d;
      --bg-2: #140611;
      --text: #fff4ea;
      --muted: #e6cbbf;
      --accent-fire: #ff7a18;
      --accent-gold: #ffb347;
      --accent-violet: #b86cff;
      --line: rgba(255, 190, 120, 0.16);
      --shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      line-height: 1.6;
      background:
        linear-gradient(rgba(8, 2, 10, 0.70), rgba(8, 2, 10, 0.88)),
        radial-gradient(circle at top left, rgba(255, 122, 24, 0.25), transparent 34%),
        radial-gradient(circle at top right, rgba(184, 108, 255, 0.22), transparent 32%),
        url('background.jpg') center center / cover fixed no-repeat,
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 140, 40, 0.16), transparent 20%),
        radial-gradient(circle at 78% 18%, rgba(185, 108, 255, 0.18), transparent 24%),
        linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.28));
      z-index: -1;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(1140px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: rgba(10, 3, 11, 0.58);
      border-bottom: 1px solid rgba(255, 180, 110, 0.12);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      gap: 16px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.4px;
      font-size: 1.1rem;
    }

    .brand span {
      background: linear-gradient(90deg, var(--accent-fire), var(--accent-gold), var(--accent-violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    main { padding: 54px 0 70px; }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(2.1rem, 4vw, 3.6rem);
      line-height: 1.1;
      margin: 0 0 10px;
    }

    p { margin: 0; color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 14px;
      font-weight: 700;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255, 190, 120, 0.18);
      color: var(--text);
      backdrop-filter: blur(10px);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 28px;
    }

    .image-card {
      background: linear-gradient(180deg, rgba(32, 12, 20, 0.82), rgba(18, 7, 14, 0.90));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .image-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.03);
    }

    .image-fallback {
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      font-weight: 800;
      background:
        linear-gradient(145deg, rgba(255, 122, 24, 0.82), rgba(111, 32, 20, 0.65) 40%, rgba(130, 60, 200, 0.68) 100%),
        url('background.jpg') center center / cover no-repeat;
    }

    footer {
      padding: 0 0 54px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 860px) {
  .gallery-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 18px;
  }

  .image-card {
    border-radius: 14px;
  }

  .image-card img,
  .image-fallback {
    aspect-ratio: 1 / 1;
  }

  .page-head {
    align-items: start;
    flex-direction: column;
  }

  .lightbox {
    padding: 12px;
  }

  .lightbox-nav {
    width: 44px;
    height: 44px;
    font-size: 1.5rem;
  }

  .lightbox-prev {
    left: 8px;
  }

  .lightbox-next {
    right: 8px;
  }

  .lightbox-counter {
    bottom: 10px;
    font-size: 0.85rem;
    padding: 6px 10px;
  }

    }
  </style>
  <script src="gallery.js" defer></script>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">Daniels <span>Laser Art</span></a>
      <a class="btn" href="index.html#galerie">← Zurück zur Startseite</a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-head">
        <div>
          <h1 id="galleryTitle">Galerie</h1>
          <p id="galleryDescription">Hier findest du die Bilder dieser Galerie.</p>
        </div>
      </div>

      <div class="gallery-grid" id="imageGrid"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      © 2025 Daniels Laser Art – C'est la vie.
    </div>
  </footer>

  <div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Schließen">×</button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Vorheriges Bild">‹</button>
  <img id="lightboxImage" src="" alt="">
  <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Nächstes Bild">›</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>
<div id="admin-stats-panel" style="display:none; position:fixed; right:16px; bottom:16px; z-index:9999; width:min(340px, calc(100vw - 24px)); border-radius:18px; overflow:hidden; background:linear-gradient(180deg, rgba(28,12,22,0.96), rgba(18,8,15,0.96)); border:1px solid rgba(255,190,120,0.22); box-shadow:0 18px 45px rgba(0,0,0,0.45); backdrop-filter:blur(12px); color:#fff4ea; font-family:Inter, Arial, sans-serif;">
  <div style="padding:14px 16px; border-bottom:1px solid rgba(255,190,120,0.12); display:flex; align-items:center; justify-content:space-between; gap:12px;">
    <div>
      <div style="font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#ffcfab;">Admin</div>
      <div style="font-size:16px; font-weight:800;">Besucherstatistik</div>
    </div>
    <button id="admin-stats-toggle" type="button" style="border:0; border-radius:10px; padding:8px 10px; cursor:pointer; background:rgba(255,255,255,0.06); color:#fff4ea; font-weight:700;">
      −
    </button>
  </div>

  <div id="admin-stats-content" style="padding:14px 16px;">
    <div style="display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px;">
      <div style="padding:12px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,190,120,0.10);">
        <div style="font-size:12px; color:#e6cbbf;">Gesamt</div>
        <div id="stat-total" style="font-size:24px; font-weight:800;">…</div>
      </div>
      <div style="padding:12px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,190,120,0.10);">
        <div style="font-size:12px; color:#e6cbbf;">Heute</div>
        <div id="stat-today" style="font-size:24px; font-weight:800;">…</div>
      </div>
      <div style="padding:12px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,190,120,0.10);">
        <div style="font-size:12px; color:#e6cbbf;">Diese Woche</div>
        <div id="stat-week" style="font-size:24px; font-weight:800;">…</div>
      </div>
      <div style="padding:12px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,190,120,0.10);">
        <div style="font-size:12px; color:#e6cbbf;">Diese Seite</div>
        <div id="stat-page" style="font-size:24px; font-weight:800;">…</div>
      </div>
    </div>

    <div style="margin-top:12px; padding:12px; border-radius:14px; background:rgba(255,122,24,0.08); border:1px solid rgba(255,190,120,0.10);">
      <div style="font-size:12px; color:#e6cbbf;">Aktuelle Seite</div>
      <div id="stat-page-path" style="font-size:13px; font-weight:700; word-break:break-all;">…</div>
    </div>
  </div>
</div>

<script src="counter.js"></script>
</body>
</html>
